<div class="page-header">
  <div>
    <h1>Add Appointment</h1>
    <p>Create a new patient appointment</p>
  </div>

  <button class="back-btn" routerLink="/appointments">← Back</button>
</div>

<div class="form-card">
  <form (ngSubmit)="saveAppointment()">
    <div class="form-group">
      <label>Patient</label>

      <select [(ngModel)]="appointment.patientId" name="patientId">
        <option [ngValue]="0">Select Patient</option>

        <option *ngFor="let patient of patients()" [ngValue]="patient.id">
          {{ patient.nom }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label>Doctor</label>

      <select [(ngModel)]="appointment.medecinId" name="medecinId">
        <option [ngValue]="0">Select Doctor</option>

        <option *ngFor="let doctor of doctors()" [ngValue]="doctor.id">
          Dr. {{ doctor.nom }} - {{ doctor.specialite }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label>Date & Time</label>

      <input type="datetime-local" [(ngModel)]="appointment.dateRendezVous" name="dateRendezVous" />
    </div>

    <div class="form-group">
      <label>Reason</label>

      <input
        type="text"
        [(ngModel)]="appointment.motif"
        name="motif"
        placeholder="Consultation, follow-up..."
      />
    </div>

    <div class="form-group">
      <label>Status</label>

      <select [(ngModel)]="appointment.statut" name="statut">
        <option value="CONFIRMED">Confirmed</option>

        <option value="PENDING">Pending</option>

        <option value="CANCELLED">Cancelled</option>
      </select>
    </div>

    <p class="error-message" *ngIf="errorMessage()">
      {{ errorMessage() }}
    </p>

    <div class="form-actions">
      <button class="save-btn" type="submit">Save Appointment</button>

      <button class="cancel-btn" type="button" routerLink="/appointments">Cancel</button>
    </div>
  </form>
</div>
