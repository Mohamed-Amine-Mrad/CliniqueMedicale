<div class="page-header">
  <div>
    <h1>Add New Patient</h1>
    <p>Create a new patient medical record</p>
  </div>

  <button class="back-btn" routerLink="/patients">
    ← Back
  </button>
</div>

<div class="form-card">

  <form (ngSubmit)="savePatient()">

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="patient.nom" name="nom" placeholder="Enter patient full name">
    </div>

    <div class="form-group">
      <label>Medical Record</label>
      <input type="text" [(ngModel)]="patient.dossierMedical" name="dossierMedical" placeholder="Example: MR-2026-001">
    </div>

    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date" [(ngModel)]="patient.dateNaissance" name="dateNaissance">
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" [(ngModel)]="patient.tel" name="tel" placeholder="Example: 22123456">
    </div>

    <div class="form-actions">
      <button class="save-btn" type="submit">Save Patient</button>
      <button class="cancel-btn" type="button" routerLink="/patients">Cancel</button>
    </div>

  </form>

</div>
