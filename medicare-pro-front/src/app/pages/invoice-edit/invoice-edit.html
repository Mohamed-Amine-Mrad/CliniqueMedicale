<div class="page-header">

  <div>
    <h1>Edit Invoice</h1>
    <p>Update invoice information</p>
  </div>

  <button class="back-btn" routerLink="/invoices">
    ← Back
  </button>

</div>

<div class="form-card">

  <form (ngSubmit)="updateInvoice()">

    <div class="form-group">
      <label>Invoice Date</label>

      <input
        type="date"
        [ngModel]="invoice().dateFacture"
        (ngModelChange)="updateField('dateFacture', $event)"
        name="dateFacture">
    </div>

    <div class="form-group">
      <label>Amount</label>

      <input
        type="number"
        [ngModel]="invoice().montant"
        (ngModelChange)="updateField('montant', $event)"
        name="montant">
    </div>

    <div class="form-group">
      <label>Payment Status</label>

      <select
        [ngModel]="invoice().statutPaiement"
        (ngModelChange)="updateField('statutPaiement', $event)"
        name="statutPaiement">

        <option value="Non Payee">Non Payee</option>
        <option value="Payee">Payee</option>

      </select>
    </div>

    <p class="error-message" *ngIf="errorMessage()">
      {{ errorMessage() }}
    </p>

    <div class="form-actions">

      <button class="save-btn" type="submit">
        Update Invoice
      </button>

      <button
        class="cancel-btn"
        type="button"
        routerLink="/invoices">

        Cancel
      </button>

    </div>

  </form>

</div>
