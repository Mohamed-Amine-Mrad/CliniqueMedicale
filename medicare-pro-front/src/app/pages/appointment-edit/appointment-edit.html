<div class="page-header">

  <div>
    <h1>Edit Appointment</h1>
    <p>Update appointment information</p>
  </div>

  <button class="back-btn" routerLink="/appointments">
    ← Back
  </button>

</div>

<div class="form-card">

  <form (ngSubmit)="updateAppointment()">

    <div class="form-group">
      <label>Patient</label>

      <select
        [ngModel]="appointment().patientId"
        (ngModelChange)="updateField('patientId', $event)"
        name="patientId">

        <option [ngValue]="0">Select Patient</option>

        <option *ngFor="let patient of patients()" [ngValue]="patient.id">
          {{ patient.nom }}
        </option>

      </select>
    </div>

    <div class="form-group">
      <label>Doctor</label>

      <select
        [ngModel]="appointment().medecinId"
        (ngModelChange)="updateField('medecinId', $event)"
        name="medecinId">

        <option [ngValue]="0">Select Doctor</option>

        <option *ngFor="let doctor of doctors()" [ngValue]="doctor.id">
          Dr. {{ doctor.nom }} - {{ doctor.specialite }}
        </option>

      </select>
    </div>

    <div class="form-group">
      <label>Date & Time</label>

      <input
        type="datetime-local"
        [ngModel]="appointment().dateRendezVous"
        (ngModelChange)="updateField('dateRendezVous', $event)"
        name="dateRendezVous">
    </div>

    <div class="form-group">
      <label>Reason</label>

      <input
        type="text"
        [ngModel]="appointment().motif"
        (ngModelChange)="updateField('motif', $event)"
        name="motif"
        placeholder="Consultation, follow-up...">
    </div>

    <div class="form-group">
      <label>Status</label>

      <select
        [ngModel]="appointment().statut"
        (ngModelChange)="updateField('statut', $event)"
        name="statut">

        <option value="CONFIRMED">Confirmed</option>
        <option value="PENDING">Pending</option>
        <option value="CANCELLED">Cancelled</option>

      </select>
    </div>

    <p class="error-message" *ngIf="errorMessage()">
      {{ errorMessage() }}
    </p>

    <div class="form-actions">

      <button class="save-btn" type="submit">
        Update Appointment
      </button>

      <button class="cancel-btn" type="button" routerLink="/appointments">
        Cancel
      </button>

    </div>

  </form>

</div>
