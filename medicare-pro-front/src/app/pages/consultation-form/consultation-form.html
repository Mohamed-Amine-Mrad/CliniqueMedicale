<div class="page-header">

  <div>
    <h1>Add Consultation</h1>
    <p>Create a consultation linked to an appointment</p>
  </div>

  <button class="back-btn" routerLink="/consultations">
    ← Back
  </button>

</div>

<div class="form-card">

  <form (ngSubmit)="saveConsultation()">

    <div class="form-group">
      <label>Appointment</label>

      <select
        [(ngModel)]="consultation.rendezVousId"
        name="rendezVousId">

        <option [ngValue]="0">Select Appointment</option>

        <option
          *ngFor="let appointment of appointments()"
          [ngValue]="appointment.id">

          {{ appointment.patientNom }}
          -
          Dr. {{ appointment.medecinNom }}
          -
          {{ appointment.dateRendezVous }}

        </option>

      </select>
    </div>

    <div class="form-group">
      <label>Diagnostic</label>

      <input
        type="text"
        [(ngModel)]="consultation.diagnostic"
        name="diagnostic"
        placeholder="Enter diagnostic">
    </div>

    <div class="form-group">
      <label>Ordonnance</label>

      <input
        type="text"
        [(ngModel)]="consultation.ordonnance"
        name="ordonnance"
        placeholder="Enter ordonnance">
    </div>

    <div class="form-group">
      <label>Price</label>

      <input
        type="number"
        [(ngModel)]="consultation.prix"
        name="prix"
        placeholder="Enter consultation price">
    </div>

    <p class="error-message" *ngIf="errorMessage()">
      {{ errorMessage() }}
    </p>

    <div class="form-actions">

      <button class="save-btn" type="submit">
        Save Consultation
      </button>

      <button
        class="cancel-btn"
        type="button"
        routerLink="/consultations">

        Cancel
      </button>

    </div>

  </form>

</div>
