<div class="page-header">

  <div>
    <h1>Edit Doctor</h1>
    <p>Update doctor information</p>
  </div>

  <button class="back-btn" routerLink="/doctors">
    ← Back
  </button>

</div>

<div class="form-card">

  <form (ngSubmit)="updateDoctor()">

    <div class="form-group">

      <label>Doctor Name</label>

      <input
        type="text"
        [ngModel]="doctor().nom"
        (ngModelChange)="updateField('nom', $event)"
        name="nom">

    </div>

    <div class="form-group">

      <label>Specialty</label>

      <input
        type="text"
        [ngModel]="doctor().specialite"
        (ngModelChange)="updateField('specialite', $event)"
        name="specialite">

    </div>

    <div class="form-group">

      <label>Availability</label>

      <select
        [ngModel]="doctor().disponibilite"
        (ngModelChange)="updateField('disponibilite', $event)"
        name="disponibilite">

        <option [ngValue]="true">
          Available
        </option>

        <option [ngValue]="false">
          Unavailable
        </option>

      </select>

    </div>

    <div class="form-actions">

      <button class="save-btn" type="submit">
        Update Doctor
      </button>

      <button
        class="cancel-btn"
        type="button"
        routerLink="/doctors">

        Cancel
      </button>

    </div>

  </form>

</div>
