<div class="login-page">

  <div class="login-card">

    <div class="login-header">

      <div class="logo-box">
        🏥
      </div>

      <h1>MediCare Pro</h1>

      <p>
        Sign in to access the clinic dashboard
      </p>

    </div>

    <form (ngSubmit)="login()">

      <div class="form-group">

        <label>Email</label>

        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email">

      </div>

      <div class="form-group">

        <label>Password</label>

        <input
          type="password"
          [(ngModel)]="motDePasse"
          name="motDePasse"
          placeholder="Enter your password">

      </div>

      <p class="error-message" *ngIf="errorMessage()">
        {{ errorMessage() }}
      </p>

      <button class="login-btn" type="submit">
        Sign In
      </button>

    </form>

    

  </div>

</div>
